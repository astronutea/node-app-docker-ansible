---
- name: Install git
  apt:
    name: git
    state: present

- name: Clone repository
  git:
    repo: "{{ repo_url }}"
    version: "{{ repo_branch }}"
    dest: "{{ app_dir }}"
    force: yes

- name: Import env-file
  template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    mode: "0600"

- name: Stop existing containers
  shell: docker compose down
  args:
    chdir: "{{ app_dir }}"
  ignore_errors: true

- name: Pull image from registry
  shell: docker pull astronutx/node-app:latest
  args:
    chdir: "{{ app_dir }}"

- name: Start containers
  shell: docker compose up -d
  args:
    chdir: "{{ app_dir }}"